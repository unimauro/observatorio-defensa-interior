# Entorno local opcional: API FastAPI + PostgreSQL.
# El sitio público (GitHub Pages) NO necesita esto; es 100% estático.
# Uso:  docker compose up --build   →   API en http://localhost:8000/docs
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: observatorio
      POSTGRES_PASSWORD: observatorio
      POSTGRES_DB: observatorio
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg2://observatorio:observatorio@db:5432/observatorio
      CORS_ORIGINS: "*"
    ports:
      - "8000:8000"
    depends_on:
      - db

volumes:
  postgres-data:
