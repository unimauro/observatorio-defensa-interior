  <text x="320" y="304" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="62" font-weight="800">e Interior</text>
  <text x="320" y="356" fill="#94a3b8" font-family="Inter, Arial, sans-serif" font-size="27" font-weight="500">Tablero de inteligencia financiera · FONAFE · MEF · OCDS</text>

